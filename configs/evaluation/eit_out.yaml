# Evaluation Configuration for EIT Inverse Problem (Out-of-Distribution)
# All models are loaded from pretrained checkpoint

run_name: "eit_out_eval"
seed: 10086

problem:
  type: "eit"
  test_data: "./data/eit/inverse_EIT_out.mat"

# REQUIRED: Pretrained model weights (contains all models: enc, u, a, nf)
pretrained:
  path: "./runs/final_eit/weights/best.pt"

# Evaluation settings
evaluation:
  method: "igno"  # "igno" for gradient-based inversion

  # Batch size for parallel inversion (significant speedup)
  # Set to large value to process all samples at once (memory permitting)
  batch_size: 50

  # Observation setup
  n_obs: 124              # Number of observation points
  obs_sampling: "random"  # "random", "grid"

  # Noise (SNR-based, same as IGNO paper)
  # Set to null for clean observations
  snr_db: null            # 20, 25, 50, 100 are common values

  # IGNO inversion parameters
  inversion:
    epochs: 500
    loss_weights:
      pde: 0.001
      data: 100.0
    optimizer:
      type: Adam
      lr: 0.01
      weight_decay: 0.0
    scheduler:
      type: StepLR
      step_size: 100
      gamma: 0.85

  # Output directory for results
  results_dir: "./results"
