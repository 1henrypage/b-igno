# Evaluation Configuration for Burgers Inverse Problem
# All models are loaded from pretrained checkpoint

run_name: "burgers_in_eval"
seed: 10086

problem:
  type: "burgers"
  test_data: "./data/burgers/viscid_test_in.mat"

# REQUIRED: Pretrained model weights (contains all models: enc, u, nf)
pretrained:
  path: "./runs/final_burgers/weights/best.pt"

# Evaluation settings
evaluation:
  method: "igno"  # "igno" for gradient-based inversion

  # Batch size for parallel inversion
  batch_size: 50

  # Observation setup
  n_obs: 100              # Number of observation points
  obs_sampling: "random"  # "random", "grid"

  # Noise (SNR-based)
  snr_db: null            # null for clean observations

  # IGNO inversion parameters
  inversion:
    epochs: 500
    loss_weights:
      pde: 1.0
      data: 50.0
    optimizer:
      type: Adam
      lr: 0.01
      weight_decay: 0.0
    scheduler:
      type: StepLR
      step_size: 100
      gamma: 0.8

  # Output directory for results
  results_dir: "./results"
